<!doctype html>
<html lang="es">
  <head>
    <title>Polaria AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              base: "#0f1117",
              surface: "#171923",
              surfaceAlt: "#1f2937",
              border: "#2c2f3a",
              input: "#232734",
              inputBorder: "#2f3444",
              accent: "#2563eb",
              accentHover: "#1d4ed8",
              textMuted: "#e5e7eb",
            },
          },
        },
      };
    </script>
  </head>

  <body class="bg-base text-white font-['Segoe_UI',sans-serif] h-screen">
    <div class="flex flex-col h-screen">

      <div class="h-[65px] bg-surface border-b border-border flex items-center justify-between gap-4 px-6 shrink-0">
        <span class="text-xl font-semibold truncate">🤖 Polaria AI (MATEO COMPRA)</span>
        <div id="selector-proveedor-wrap" class="hidden items-center gap-2 text-sm shrink-0">
          <span id="proveedor-activo-label" class="text-textMuted hidden md:inline"></span>
          <label class="flex items-center gap-2">
            <span class="text-textMuted hidden sm:inline">Proveedor</span>
            <select
              id="selector-proveedor"
              class="bg-input border border-inputBorder text-white rounded-lg px-3 py-2 text-sm outline-none focus:border-accent max-w-[220px]"
            ></select>
          </label>
        </div>
      </div>

      <div id="chat" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 scroll-smooth
        [&::-webkit-scrollbar]:w-2
        [&::-webkit-scrollbar-track]:bg-transparent
        [&::-webkit-scrollbar-thumb]:bg-[#303544]
        [&::-webkit-scrollbar-thumb]:rounded-full">
      </div>

      <div class="flex gap-3 p-5 bg-surface border-t border-border shrink-0">
        <input
          id="mensaje"
          type="text"
          placeholder="Escribe un mensaje para MATEO..."
          onkeydown="if(event.key==='Enter') enviar();"
          class="flex-1 bg-input border border-inputBorder text-white rounded-xl px-4 py-3 text-[15px] outline-none focus:border-accent transition-colors"
        />
        <button
          id="btn-enviar"
          onclick="enviar()"
          class="bg-accent hover:bg-accentHover text-white font-semibold px-6 rounded-xl transition-colors cursor-pointer border-none"
        >
          Enviar
        </button>
      </div>

    </div>

    <script src="/n8n-config.js"></script>
    <script src="/chat-config.js"></script>
    <script src="/formato-texto.js"></script>
    <script>
      let proveedorActivo = CHAT.proveedores[0];

      function normalizarTelefono(telefono) {
        const limpio = telefono.trim();
        return limpio.startsWith("+") ? limpio : `+${limpio}`;
      }

      function resolverProveedorInicial() {
        const params = new URLSearchParams(window.location.search);
        const telefonoUrl = params.get("telefono");
        if (telefonoUrl) {
          const telefono = normalizarTelefono(telefonoUrl);
          const encontrado = CHAT.proveedores.find((p) => p.telefono === telefono);
          if (encontrado) return encontrado;
          return { telefono, nombre: telefono };
        }

        const guardado = localStorage.getItem("mateo_proveedor_telefono");
        if (guardado) {
          const encontrado = CHAT.proveedores.find((p) => p.telefono === guardado);
          if (encontrado) return encontrado;
          localStorage.removeItem("mateo_proveedor_telefono");
        }

        return CHAT.proveedores[0];
      }

      function actualizarEtiquetaProveedor() {
        const label = document.getElementById("proveedor-activo-label");
        if (!label || !proveedorActivo) return;
        label.textContent = `${proveedorActivo.nombre} (${proveedorActivo.telefono})`;
      }

      function seleccionarProveedor(proveedor) {
        proveedorActivo = proveedor;
        localStorage.setItem("mateo_proveedor_telefono", proveedor.telefono);
        const select = document.getElementById("selector-proveedor");
        if (select) select.value = proveedor.telefono;
        actualizarEtiquetaProveedor();
      }

      function inicializarSelectorProveedor() {
        const wrap = document.getElementById("selector-proveedor-wrap");
        const select = document.getElementById("selector-proveedor");

        CHAT.proveedores.forEach((proveedor) => {
          const option = document.createElement("option");
          option.value = proveedor.telefono;
          option.textContent = proveedor.nombre;
          select.appendChild(option);
        });

        seleccionarProveedor(resolverProveedorInicial());
        wrap.classList.remove("hidden");
        wrap.classList.add("flex");

        if (CHAT.proveedores.length === 1) {
          select.classList.add("hidden");
        }

        select.addEventListener("change", () => {
          const telefono = select.value;
          const proveedor =
            CHAT.proveedores.find((p) => p.telefono === telefono) ||
            { telefono, nombre: telefono };
          seleccionarProveedor(proveedor);
        });
      }

      inicializarSelectorProveedor();

      const canalEscucha = new EventSource('/escuchar-mateo');

      canalEscucha.onmessage = function(event) {
        try {
          const data = JSON.parse(event.data);
          const texto =
            data.texto ??
            data.mensaje_final ??
            data.output ??
            data.reply ??
            data.mensaje ??
            data.message;

          if (texto) agregar(texto, "ia");
        } catch (e) {
          console.error("Error parseando la respuesta asíncrona:", e);
        }
      };

      canalEscucha.onerror = function() {
        console.log("Intentando reconectar al canal de respuesta local...");
      };

      async function enviar() {
        const input = document.getElementById("mensaje");
        const btn = document.getElementById("btn-enviar");
        const texto = input.value.trim();

        if (!texto) return;

        agregar(texto, "usuario");
        input.value = "";

        btn.disabled = true;
        btn.classList.add("opacity-50");

        const payload = {
          entry: [{
            changes: [{
              value: {
                metadata: { phone_number_id: CHAT.phoneNumberId },
                messages: [{
                  from: proveedorActivo.telefono,
                  id: "wamid." + crypto.randomUUID().replace(/-/g, ""),
                  type: "text",
                  text: { body: texto },
                }],
              },
            }],
          }],
        };

        try {
          const response = await fetch("/enviar-mensaje", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const raw = await response.text();
          let data = {};
          if (raw) {
            try {
              data = JSON.parse(raw);
            } catch {
              data = { texto: raw };
            }
          }

          if (!response.ok) {
            const detalle = data.error || data.mensaje || raw || `HTTP ${response.status}`;
            agregar(`Error al enviar (${response.status}): ${detalle}`, "ia");
            return;
          }

          const respuesta =
            data.texto ??
            data.reply ??
            data.output ??
            data.mensaje ??
            data.message;

          if (respuesta) {
            agregar(respuesta, "ia");
          }
        } catch (error) {
          agregar(`Error al enviar el mensaje: ${error.message}`, "ia");
        } finally {
          btn.disabled = false;
          btn.classList.remove("opacity-50");
        }
      }

      function agregar(texto, tipo) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        const esUsuario = tipo === "usuario";

        div.className = [
          "max-w-[75%] px-[18px] py-[14px] leading-relaxed break-words",
          esUsuario
            ? "self-end bg-accent text-white rounded-[18px] rounded-br-[5px] whitespace-pre-wrap"
            : "self-start bg-surfaceAlt text-textMuted rounded-[18px] rounded-bl-[5px]",
        ].join(" ");

        if (esUsuario) {
          div.textContent = texto;
        } else {
          div.innerHTML = formatearMarkdown(texto);
        }
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }
    </script>
  </body>
</html>
